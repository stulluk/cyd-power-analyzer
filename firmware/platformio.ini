; CYD + TFT_eSPI — pin profile from Marauder User_Setup_cyd24.h.
; Pinned platform espressif32 6.x for reproducible builds (raise only after smoke-testing TFT_eSPI on-device).

[env:cyd]
platform = espressif32@6.8.1
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:scripts/gen_wifi_credentials.py

; Marauder CYD builds use ggaljoen fork (zip: no Git client needed in Docker).
lib_deps =
  https://github.com/ggaljoen/TFT_eSPI/archive/bb824c2435237cf076f871c91a95669d2600e9bc.zip
  lvgl/lvgl@8.3.11

build_flags =
  ; Load CYD pins first, then USER_SETUP_LOADED skips User_Setup_Select's default library User_Setup.h (otherwise pins/SPIfreq get overwritten).
  -include include/User_Setup.h
  -D USER_SETUP_LOADED
  -D LV_CONF_INCLUDE_SIMPLE
  ; LVGL lib builds need lv_conf.h on the include path (see lv_conf_internal.h).
  -I include
